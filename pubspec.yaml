name: finefood_paketleme
description: Finefood Paketleme arama uygulamasi
publish_to: "none"

version: 1.0.0+22

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  simple_barcode_scanner: ^0.6.0
  pdf: ^3.13.0
  printing: any
  qr_flutter: ^4.1.0
  barcode: ^2.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24
