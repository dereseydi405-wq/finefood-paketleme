name: Build Finefood Paketleme APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Android dosyalarını oluştur
        run: flutter create . --platforms=android --org com.finefoodpaketleme

      - name: Android izinlerini ve minSdk ayarla
        run: |
          if ! grep -q "android.permission.CAMERA" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA" />\n    <application|' android/app/src/main/AndroidManifest.xml
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle.kts
          fi

      - name: Paketleri indir
        run: flutter pub get

      - name: Uygulama ikonunu oluştur
        run: dart run flutter_launcher_icons

      - name: Android SDK 36 ayarla
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME" "$ANDROID_SDK_ROOT" -name sdkmanager -type f 2>/dev/null | head -n 1)"
          fi
          echo "SDKMANAGER=$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
            sed -i 's/compileSdk = [0-9]\+/compileSdk = 36/g' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 36/g' android/app/build.gradle
            sed -i 's/compileSdk [0-9]\+/compileSdk 36/g' android/app/build.gradle
          fi

      - name: APK oluştur
        run: |
          python3 - <<'PYSDK'
          from pathlib import Path
          import re

          files = [
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ]

          ok = False

          for p in files:
              if not p.exists():
                  continue

              text = p.read_text(encoding="utf-8")

              text = re.sub(
                  r"compileSdk\s*=\s*(flutter\.compileSdkVersion|\d+)",
                  "compileSdk = 36",
                  text,
              )
              text = re.sub(
                  r"compileSdkVersion\s+(flutter\.compileSdkVersion|\d+)",
                  "compileSdkVersion 36",
                  text,
              )

              p.write_text(text, encoding="utf-8")

              for line in text.splitlines():
                  if "compileSdk" in line:
                      print(f"{p}: {line}")
                      if "36" in line:
                          ok = True

          if not ok:
              raise SystemExit("compileSdk 36 uygulanamadı")
          PYSDK

          flutter build apk --release

      - name: APK ismini ayarla
        run: |
          mkdir -p build-output
          cp build/app/outputs/flutter-apk/app-release.apk build-output/Finefood-Paketleme.apk

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Finefood-Paketleme-APK
          path: build-output/Finefood-Paketleme.apk
