name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Android dosyalarını oluştur
        run: flutter create . --platforms=android

      - name: Paketleri indir
        run: flutter pub get

      - name: Android SDK 36 ayarla
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" || true

      - name: Android compileSdk düzelt
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          files = [Path("android/app/build.gradle.kts")]
          pub = Path.home() / ".pub-cache" / "hosted" / "pub.dev"
          if pub.exists():
              files += list(pub.glob("**/android/build.gradle"))
              files += list(pub.glob("**/android/build.gradle.kts"))

          for p in files:
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8", errors="ignore")
              old = s
              s = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 36", s)
              s = re.sub(r"compileSdk\s*=\s*\d+", "compileSdk = 36", s)
              s = re.sub(r"compileSdk\s+\d+", "compileSdk 36", s)
              s = re.sub(r"compileSdkVersion\s*=\s*\d+", "compileSdkVersion = 36", s)
              s = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", s)
              if s != old:
                  p.write_text(s, encoding="utf-8")
                  print(f"{p}: compileSdk 36")
          PY

      - name: Uygulama ikonunu oluştur
        run: dart run flutter_launcher_icons || true

      - name: Debug APK oluştur
        run: flutter build apk --debug

      - name: APK ismini ayarla
        run: cp build/app/outputs/flutter-apk/app-debug.apk Finefood-Paketleme.apk

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Finefood-Paketleme-APK
          path: Finefood-Paketleme.apk
